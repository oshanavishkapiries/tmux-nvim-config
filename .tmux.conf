# Shell
set -g default-shell "C:/Program Files/PowerShell/7/pwsh.exe"

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 10000
set -g set-clipboard on

# Colors
set -g default-terminal "tmux-256color"

# Status bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

set -g status-right-length 60
set -g status-right "#[fg=#6c7086]#[bg=#6c7086,fg=#1e1e2e] %H:%M #[bg=#89b4fa,fg=#1e1e2e,bold] #h "

set -g window-status-format "#[fg=#6c7086] #I #W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I #W "

set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message bar
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
